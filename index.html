<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/images/apple-touch-icon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Old School Pinball - O Melhor Espaço de Pinball da América Latina. Arcade, Bar e diversão retrô em São Paulo." />

  <!-- Social Media Meta Tags -->
  <meta property="og:image" content="/images/og-image.png" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="/images/og-image.png" />

  <!-- Theme Color -->
  <meta name="theme-color" content="#ff5500" />

  <!-- LCP Preload — single SVG logo used everywhere -->
  <link rel="preload" as="image" href="/images/logo_oldschool_vector_600p.svg" fetchpriority="high"
    type="image/svg+xml" />


  <!-- Fonts: self-hosted, loaded non-render-blocking -->
  <link rel="preload" as="font" href="/fonts/6aez4K2oVqwIvtU2Hw.woff2" crossorigin type="font/woff2">
  <link rel="preload" as="font" href="/fonts/6ae84K2oVqwItm4TCpAy2g.woff2" crossorigin type="font/woff2">
  <link rel="stylesheet" href="/fonts.css" media="print" onload="this.media='all'" />
  <noscript>
    <link rel="stylesheet" href="/fonts.css" />
  </noscript>

  <title>Old School · Pinball · Arcade · Bar · São Paulo</title>

  <style>
    /* Skip-to-content */
    .skip-link {
      position: absolute;
      left: -9999px;
      z-index: 10000
    }

    .skip-link:focus {
      position: fixed;
      left: 8px;
      top: 8px;
      padding: 8px 16px;
      background: #c41e1e;
      color: #fff;
      border-radius: 6px;
      font-size: 14px;
      text-decoration: none
    }

    /* Preloader — renders before React, becomes LCP */
    #preloader {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #080305;
      transition: opacity .4s ease-out, visibility .4s ease-out
    }

    html[data-loaded] #preloader {
      opacity: 0;
      visibility: hidden;
      pointer-events: none
    }

    #preloader img {
      width: clamp(140px, 35vw, 280px);
      height: auto;
      animation: preloaderFade .8s ease-out both
    }

    @keyframes preloaderFade {
      from {
        opacity: 0;
        transform: translateY(16px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }
  </style>
</head>

<body style="background-color:#080305">
  <a href="#main-content" class="skip-link">Skip to content</a>

  <!-- Preloader: hero logo painted before React = instant LCP -->
  <div id="preloader" aria-hidden="true">
    <img src="/images/logo_oldschool_vector_600p.svg" alt="" width="600" height="478" fetchpriority="high">
  </div>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
